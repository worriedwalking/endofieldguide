<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>the endometriosis catalog</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Karla:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="eyebrow">a running catalog</div>
  <h1>the endometriosis library</h1>
  <p class="sub">papers, sites, and firsthand accounts, gathered in one drawer. read the plain-language line on the front of the card, or pull it open for the full record.</p>
  <div class="stitch"></div>
  <div class="stats" id="stats"></div>
</header>

<div class="toolbar">
  <input type="text" id="search" placeholder="search the catalog...">
  <select id="filterTopic"><option value="">all topics</option></select>
  <select id="filterSource"><option value="">all source types</option></select>
  <select id="filterEvidence"><option value="">all evidence levels</option></select>
  <button class="clear" id="clearBtn">clear filters</button>
</div>



<main>
  <div class="catalog" id="catalog"></div>
</main>

<script>

const TAB_COLORS = {
  'clinical study': 'var(--tab-clinical)',
  'systematic review': 'var(--tab-review)',
  'expert opinion': 'var(--tab-expert)',
  'personal anecdote': 'var(--tab-anecdote)'
};
function tabColor(level){
  return TAB_COLORS[(level||'').toLowerCase().trim()] || 'var(--tab-na)';
}

let ALL_ROWS = [];

function renderFilters(rows){
  const topics = [...new Set(rows.map(r=>r.topic_tag).filter(Boolean))].sort();
  const sources = [...new Set(rows.map(r=>r.source_type).filter(Boolean))].sort();
  const evidences = [...new Set(rows.map(r=>r.evidence_level).filter(Boolean))].sort();
  const fill = (id, items) => {
    const sel = document.getElementById(id);
    items.forEach(v=>{
      const opt = document.createElement('option');
      opt.value = v; opt.textContent = v;
      sel.appendChild(opt);
    });
  };
  fill('filterTopic', topics);
  fill('filterSource', sources);
  fill('filterEvidence', evidences);
}

function matchesFilters(row){
  const q = document.getElementById('search').value.toLowerCase().trim();
  const topic = document.getElementById('filterTopic').value;
  const source = document.getElementById('filterSource').value;
  const evidence = document.getElementById('filterEvidence').value;

  if(topic && row.topic_tag !== topic) return false;
  if(source && row.source_type !== source) return false;
  if(evidence && row.evidence_level !== evidence) return false;

  if(q){
    const haystack = [row.title,row.authors,row.keywords,row.plain_summary,row.subtopic_tags]
      .join(' ').toLowerCase();
    if(!haystack.includes(q)) return false;
  }
  return true;
}

function esc(str){
  if(str==null) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function buildDetail(row){
  const findings = (row.key_findings||'').split(';').filter(Boolean).map(f=>`<li>${esc(f.trim())}</li>`).join('');
  return `
    <div class="detail">
      <div class="detail-block">
        <h4>why it matters</h4>
        <p>${esc(row.relevance) || '—'}</p>
      </div>
      <div class="detail-block">
        <h4>methodology</h4>
        <p>${esc(row.methodology_type) || 'n/a'} ${row.peer_reviewed && row.peer_reviewed !== 'n/a' ? '· peer reviewed: ' + esc(row.peer_reviewed) : ''}</p>
      </div>
      <div class="detail-block">
        <h4>abstract / excerpt</h4>
        <p>${esc(row.abstract_excerpt) || '—'}</p>
      </div>
      <div class="detail-block">
        <h4>key findings</h4>
        ${findings ? `<ul>${findings}</ul>` : '<p>—</p>'}
      </div>
    </div>
  `;
}

function render(){
  const catalog = document.getElementById('catalog');
  const filtered = ALL_ROWS.filter(matchesFilters);
  catalog.innerHTML = '';

  if(!filtered.length){
    catalog.innerHTML = `<div class="empty">no cards match that search. try clearing a filter.</div>`;
    return;
  }

  filtered.forEach((row, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.tabIndex = 0;

    const subtags = (row.subtopic_tags||'').split(';').filter(Boolean).map(t=>`<span class="chip">${esc(t.trim())}</span>`).join('');
    // accession number, purely cosmetic, just gives each card the feel
    // of a numbered catalog entry, counts from however the list is sorted
    const accession = 'No. ' + String(i+1).padStart(3,'0');

    card.innerHTML = `
      <div class="card-tab" style="background:${tabColor(row.evidence_level)}"></div>
      <div class="card-body">
        <div class="card-meta"><span>${accession}</span><span>${esc(row.year)||''}</span></div>
        <h3 class="card-title">${esc(row.title)}</h3>
        <div class="card-authors">${esc(row.authors) || esc(row.source_name) || '—'}</div>
        <p class="card-summary">${esc(row.plain_summary)}</p>
        <div class="card-footer">
          <span class="chip">${esc(row.topic_tag)}</span>
          ${subtags}
          <span class="badge" style="background:${tabColor(row.evidence_level)}">${esc(row.evidence_level)||'n/a'}</span>
          <span class="source-tag">${esc(row.source_type)}</span>
          <a class="source-link" href="${esc(row.link)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${row.link ? 'view source ↗' : ''}</a>
        </div>
        <div class="detail-slot"></div>
      </div>
    `;

    let open = false;
    const slot = card.querySelector('.detail-slot');
    const toggle = ()=>{
      open = !open;
      card.classList.toggle('open', open);
      slot.innerHTML = open ? buildDetail(row) : '';
    };
    card.addEventListener('click', toggle);
    card.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); toggle(); }
    });

    catalog.appendChild(card);
  });
}

function renderStats(){
  const total = ALL_ROWS.length;
  const papers = ALL_ROWS.filter(r=>(r.source_type||'').toLowerCase()==='paper').length;
  const other = total - papers;
  document.getElementById('stats').innerHTML = `
    <div><b>${total}</b> entries filed</div>
    <div><b>${papers}</b> peer reviewed</div>
    <div><b>${other}</b> other sources</div>
  `;
}

['search','filterTopic','filterSource','filterEvidence'].forEach(id=>{
  document.getElementById(id).addEventListener('input', render);
  document.getElementById(id).addEventListener('change', render);
});
document.getElementById('clearBtn').addEventListener('click', ()=>{
  document.getElementById('search').value='';
  document.getElementById('filterTopic').value='';
  document.getElementById('filterSource').value='';
  document.getElementById('filterEvidence').value='';
  render();
});

document.getElementById('addToggle').addEventListener('click', ()=>{
  const panel = document.getElementById('addPanel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
});

function csvField(val){
  val = (val||'').trim();
  if(val.includes(',') || val.includes('"') || val.includes('\n')){
    return '"' + val.replace(/"/g,'""') + '"';
  }
  return val;
}

document.getElementById('generateBtn').addEventListener('click', ()=>{
  const fields = [
    'f_title','f_source_type','f_authors','f_year','f_source_name','f_link',
    'f_topic_tag','f_subtopic_tags','f_keywords','f_plain_summary','f_relevance',
    'f_abstract_excerpt','f_key_findings','f_methodology_type','f_peer_reviewed','f_evidence_level'
  ];
  const line = fields.map(id => csvField(document.getElementById(id).value)).join(',');
  const out = document.getElementById('csvOutput');
  out.value = line;
  out.style.display = 'block';
  document.getElementById('copyBtn').style.display = 'inline-block';
});

document.getElementById('copyBtn').addEventListener('click', ()=>{
  const out = document.getElementById('csvOutput');
  out.select();
  navigator.clipboard.writeText(out.value);
  const btn = document.getElementById('copyBtn');
  const original = btn.textContent;
  btn.textContent = 'copied';
  setTimeout(()=>{ btn.textContent = original; }, 1400);
});

Papa.parse('entries.csv', {
  download:true,
  header:true,
  skipEmptyLines:true,
  complete: function(results){
    ALL_ROWS = results.data;
    renderFilters(ALL_ROWS);
    renderStats();
    render();
  },
  error: function(err){
    document.getElementById('catalog').innerHTML =
      `<div class="empty">couldn't load entries.csv, make sure it's sitting in the same folder as this html file.</div>`;
  }
});
</script>
</body>
</html>
