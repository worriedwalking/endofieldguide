<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>the endometriosis catalog</title>

<!--
  Same engine as before: one html file, one csv file sitting next to it,
  javascript reads the csv and draws everything on screen. Nothing
  changed about how the data flows, this pass was purely about making
  it look like something a person made rather than a spreadsheet tool.

  The idea: since you spend your days cataloguing and archiving things,
  this is styled like a card catalog drawer. Each entry is an index
  card, not a table row. The coloured strip along the top of each card
  is the same evidence-level colour coding as before, just shown the
  way an old library catalog used to colour-code its tabs.
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Karla:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
  /*
    Palette note: warm parchment paper, oxblood red for the accent (the
    colour of an old rubber date-stamp, fits the archive feel), and a
    deep forest green for links, like the green banker's lamps in old
    reading rooms. Kept the same evidence-level colours as before so
    nothing about the data logic changed, just how it's presented.
  */
  :root{
    --paper:#EFE3CC;
    --card:#FBF6EA;
    --card-line:#D9C6A0;
    --ink:#2A2118;
    --ink-soft:#7C6F5C;
    --stamp:#8B2E3F;
    --stamp-soft:#EEDAD3;
    --forest:#3B5D52;

    --tab-clinical:#3B5D52;
    --tab-review:#7FA285;
    --tab-expert:#B6862F;
    --tab-anecdote:#8B2E3F;
    --tab-na:#A79C8C;
  }

  *{box-sizing:border-box;}
  ::selection{background:var(--stamp-soft);}

  body{
    margin:0;
    background:var(--paper);
    background-image:
      radial-gradient(circle at 1px 1px, rgba(42,33,24,0.045) 1px, transparent 0);
    background-size:22px 22px; /* a faint paper-grain texture, barely visible, just enough to not look flat digital */
    color:var(--ink);
    font-family:'Karla', sans-serif;
    font-size:15.5px;
    line-height:1.55;
  }

  a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, .card:focus-visible{
    outline:2px solid var(--stamp);
    outline-offset:2px;
  }

  header{
    padding:60px 32px 20px;
    max-width:1180px;
    margin:0 auto;
  }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:11.5px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--stamp);
    margin-bottom:14px;
  }
  h1{
    font-family:'Fraunces', serif;
    font-optical-sizing:auto;
    font-weight:600;
    font-size:clamp(32px,4.6vw,52px);
    margin:0 0 14px;
    letter-spacing:-0.01em;
  }
  .sub{
    color:var(--ink-soft);
    max-width:560px;
    font-size:16.5px;
    font-style:italic;
    margin-bottom:26px;
  }

  /* a stitched-ledger divider instead of a plain hairline, small nod to
     a bound notebook edge rather than a ui component */
  .stitch{
    height:1px;
    background-image:repeating-linear-gradient(90deg, var(--card-line) 0 6px, transparent 6px 12px);
    margin:0 0 22px;
  }

  .stats{
    display:flex;
    gap:26px;
    flex-wrap:wrap;
    font-size:14px;
    color:var(--ink-soft);
  }
  .stats b{
    font-family:'Fraunces', serif;
    font-weight:600;
    color:var(--ink);
    font-size:17px;
  }

  .toolbar{
    max-width:1180px;
    margin:0 auto;
    padding:8px 32px 24px;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
  }
  input[type=text], select{
    font-family:'Karla', sans-serif;
    font-size:14.5px;
    padding:10px 14px;
    border:1px solid var(--card-line);
    border-radius:5px;
    background:var(--card);
    color:var(--ink);
  }
  input[type=text]{
    flex:1 1 220px;
    min-width:180px;
  }
  select{cursor:pointer;}
  button.clear{
    font-family:'Karla', sans-serif;
    font-weight:500;
    font-size:13.5px;
    padding:9px 15px;
    border-radius:5px;
    border:1px solid var(--card-line);
    background:transparent;
    color:var(--ink-soft);
    cursor:pointer;
  }
  button.clear:hover{border-color:var(--stamp);color:var(--stamp);}

  main{
    max-width:1180px;
    margin:0 auto;
    padding:0 32px 90px;
  }

  /* the catalog itself: a responsive grid of cards rather than a table */
  .catalog{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));
    gap:20px;
    align-items:start;
  }

  .card{
    background:var(--card);
    border:1px solid var(--card-line);
    border-radius:3px;
    cursor:pointer;
    /* the offset hard shadow (rather than a soft blurred one) is what
       gives these the stacked, physical index-card feel */
    box-shadow:4px 4px 0 rgba(42,33,24,0.08);
    transition:transform .12s ease, box-shadow .12s ease;
    overflow:hidden;
  }
  .card:hover{
    transform:translate(-2px,-2px);
    box-shadow:6px 6px 0 rgba(42,33,24,0.12);
  }
  .card.open{
    grid-column:1 / -1; /* an open card takes the full row so there's room to read */
  }

  .card-tab{
    height:7px;
    width:100%;
  }
  .card-body{
    padding:18px 20px 16px;
  }
  .card-meta{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--ink-soft);
    margin-bottom:10px;
  }
  .card-title{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:18.5px;
    line-height:1.3;
    margin:0 0 4px;
  }
  .card-authors{
    font-size:13px;
    font-style:italic;
    color:var(--ink-soft);
    margin-bottom:10px;
  }
  .card-summary{
    font-size:14.5px;
    color:var(--ink);
    margin-bottom:14px;
  }
  .card-footer{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    align-items:center;
  }
  .chip{
    display:inline-block;
    font-size:12px;
    padding:3px 10px;
    border-radius:20px;
    background:var(--stamp-soft);
    color:var(--stamp);
  }
  .badge{
    display:inline-block;
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    letter-spacing:.03em;
    padding:3px 9px;
    border-radius:20px;
    color:#fff;
    white-space:nowrap;
  }
  .source-tag{
    font-size:12px;
    color:var(--ink-soft);
  }
  a.source-link{
    margin-left:auto;
    color:var(--forest);
    text-decoration:none;
    font-size:13px;
    font-weight:500;
  }
  a.source-link:hover{text-decoration:underline;}

  /* the bit that unfolds when a card is opened, styled like the back of
     the index card, separated by the same stitched-line motif as the header */
  .detail{
    border-top:1px dashed var(--card-line);
    margin-top:14px;
    padding-top:14px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px 24px;
  }
  .detail-block h4{
    margin:0 0 5px;
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    letter-spacing:.06em;
    text-transform:uppercase;
    color:var(--stamp);
  }
  .detail-block p{margin:0; font-size:14px; color:var(--ink);}
  .detail-block ul{margin:4px 0 0; padding-left:18px; font-size:14px;}

  .empty{
    grid-column:1/-1;
    padding:70px 20px;
    text-align:center;
    color:var(--ink-soft);
    font-family:'Fraunces', serif;
    font-style:italic;
    font-size:17px;
  }

  @media (max-width:720px){
    .catalog{grid-template-columns:1fr;}
    .detail{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">a running catalog</div>
  <h1>the endometriosis library</h1>
  <p class="sub">papers, sites, and firsthand accounts, gathered in one drawer. read the plain-language line on the front of the card, or pull it open for the full record.</p>
  <div class="stitch"></div>
  <div class="stats" id="stats"></div>
</header>

<div class="toolbar">
  <input type="text" id="search" placeholder="search the catalog...">
  <select id="filterTopic"><option value="">all topics</option></select>
  <select id="filterSource"><option value="">all source types</option></select>
  <select id="filterEvidence"><option value="">all evidence levels</option></select>
  <button class="clear" id="clearBtn">clear filters</button>
</div>

<main>
  <div class="catalog" id="catalog"></div>
</main>

<script>
/*
  Same three jobs as always: load the csv, turn each row into a card,
  redraw when a filter changes. The only real difference from a plain
  table version is that render() below builds <div class="card"> blocks
  instead of <tr> rows, and each card holds its own detail panel inside
  itself instead of a separate row underneath.
*/

const TAB_COLORS = {
  'clinical study': 'var(--tab-clinical)',
  'systematic review': 'var(--tab-review)',
  'expert opinion': 'var(--tab-expert)',
  'personal anecdote': 'var(--tab-anecdote)'
};
function tabColor(level){
  return TAB_COLORS[(level||'').toLowerCase().trim()] || 'var(--tab-na)';
}

let ALL_ROWS = [];

function renderFilters(rows){
  const topics = [...new Set(rows.map(r=>r.topic_tag).filter(Boolean))].sort();
  const sources = [...new Set(rows.map(r=>r.source_type).filter(Boolean))].sort();
  const evidences = [...new Set(rows.map(r=>r.evidence_level).filter(Boolean))].sort();
  const fill = (id, items) => {
    const sel = document.getElementById(id);
    items.forEach(v=>{
      const opt = document.createElement('option');
      opt.value = v; opt.textContent = v;
      sel.appendChild(opt);
    });
  };
  fill('filterTopic', topics);
  fill('filterSource', sources);
  fill('filterEvidence', evidences);
}

function matchesFilters(row){
  const q = document.getElementById('search').value.toLowerCase().trim();
  const topic = document.getElementById('filterTopic').value;
  const source = document.getElementById('filterSource').value;
  const evidence = document.getElementById('filterEvidence').value;

  if(topic && row.topic_tag !== topic) return false;
  if(source && row.source_type !== source) return false;
  if(evidence && row.evidence_level !== evidence) return false;

  if(q){
    const haystack = [row.title,row.authors,row.keywords,row.plain_summary,row.subtopic_tags]
      .join(' ').toLowerCase();
    if(!haystack.includes(q)) return false;
  }
  return true;
}

function esc(str){
  if(str==null) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function buildDetail(row){
  const findings = (row.key_findings||'').split(';').filter(Boolean).map(f=>`<li>${esc(f.trim())}</li>`).join('');
  return `
    <div class="detail">
      <div class="detail-block">
        <h4>why it matters</h4>
        <p>${esc(row.relevance) || '—'}</p>
      </div>
      <div class="detail-block">
        <h4>methodology</h4>
        <p>${esc(row.methodology_type) || 'n/a'} ${row.peer_reviewed && row.peer_reviewed !== 'n/a' ? '· peer reviewed: ' + esc(row.peer_reviewed) : ''}</p>
      </div>
      <div class="detail-block">
        <h4>abstract / excerpt</h4>
        <p>${esc(row.abstract_excerpt) || '—'}</p>
      </div>
      <div class="detail-block">
        <h4>key findings</h4>
        ${findings ? `<ul>${findings}</ul>` : '<p>—</p>'}
      </div>
    </div>
  `;
}

function render(){
  const catalog = document.getElementById('catalog');
  const filtered = ALL_ROWS.filter(matchesFilters);
  catalog.innerHTML = '';

  if(!filtered.length){
    catalog.innerHTML = `<div class="empty">no cards match that search. try clearing a filter.</div>`;
    return;
  }

  filtered.forEach((row, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.tabIndex = 0;

    const subtags = (row.subtopic_tags||'').split(';').filter(Boolean).map(t=>`<span class="chip">${esc(t.trim())}</span>`).join('');
    // accession number, purely cosmetic, just gives each card the feel
    // of a numbered catalog entry, counts from however the list is sorted
    const accession = 'No. ' + String(i+1).padStart(3,'0');

    card.innerHTML = `
      <div class="card-tab" style="background:${tabColor(row.evidence_level)}"></div>
      <div class="card-body">
        <div class="card-meta"><span>${accession}</span><span>${esc(row.year)||''}</span></div>
        <h3 class="card-title">${esc(row.title)}</h3>
        <div class="card-authors">${esc(row.authors) || esc(row.source_name) || '—'}</div>
        <p class="card-summary">${esc(row.plain_summary)}</p>
        <div class="card-footer">
          <span class="chip">${esc(row.topic_tag)}</span>
          ${subtags}
          <span class="badge" style="background:${tabColor(row.evidence_level)}">${esc(row.evidence_level)||'n/a'}</span>
          <span class="source-tag">${esc(row.source_type)}</span>
          <a class="source-link" href="${esc(row.link)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${row.link ? 'view source ↗' : ''}</a>
        </div>
        <div class="detail-slot"></div>
      </div>
    `;

    let open = false;
    const slot = card.querySelector('.detail-slot');
    const toggle = ()=>{
      open = !open;
      card.classList.toggle('open', open);
      slot.innerHTML = open ? buildDetail(row) : '';
    };
    card.addEventListener('click', toggle);
    card.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); toggle(); }
    });

    catalog.appendChild(card);
  });
}

function renderStats(){
  const total = ALL_ROWS.length;
  const papers = ALL_ROWS.filter(r=>(r.source_type||'').toLowerCase()==='paper').length;
  const other = total - papers;
  document.getElementById('stats').innerHTML = `
    <div><b>${total}</b> entries filed</div>
    <div><b>${papers}</b> peer reviewed</div>
    <div><b>${other}</b> other sources</div>
  `;
}

['search','filterTopic','filterSource','filterEvidence'].forEach(id=>{
  document.getElementById(id).addEventListener('input', render);
  document.getElementById(id).addEventListener('change', render);
});
document.getElementById('clearBtn').addEventListener('click', ()=>{
  document.getElementById('search').value='';
  document.getElementById('filterTopic').value='';
  document.getElementById('filterSource').value='';
  document.getElementById('filterEvidence').value='';
  render();
});

Papa.parse('entries.csv', {
  download:true,
  header:true,
  skipEmptyLines:true,
  complete: function(results){
    ALL_ROWS = results.data;
    renderFilters(ALL_ROWS);
    renderStats();
    render();
  },
  error: function(err){
    document.getElementById('catalog').innerHTML =
      `<div class="empty">couldn't load entries.csv, make sure it's sitting in the same folder as this html file.</div>`;
  }
});
</script>
</body>
</html>
